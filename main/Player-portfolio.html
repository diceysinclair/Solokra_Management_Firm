<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players Gallery</title>
  <style>
    /* styles.css */

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: #f2f2f2;
}

header {
  background: #333;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.player-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.player-card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.player-card:hover {
  transform: translateY(-5px);
}

.player-card img {
  width: 100%;
  max-width: 150px;
  height: auto;
  border-radius: 50%;
  margin-bottom: 15px;
}

.player-card h2 {
  font-size: 1.5em;
  margin: 10px 0 5px;
}

.player-card p {
  margin: 0;
  color: #555;
}

  </style>
</head>
<body>
  <header>
    <h1>Players Gallery</h1>
  </header>
  <main>
    <div class="player-grid">
      <!-- Example player card 1 -->
      <div class="player-card">
        <img src="player1.jpg" alt="John Doe">
        <h2>John Doe</h2>
        <p>Forward</p>
      </div>
      <!-- Example player card 2 -->
      <div class="player-card">
        <img src="player2.jpg" alt="Jane Smith">
        <h2>Jane Smith</h2>
        <p>Midfielder</p>
      </div>
      <!-- Add more player cards as needed -->
      <div class="player-card">
        <img src="player3.jpg" alt="Alex Brown">
        <h2>Alex Brown</h2>
        <p>Defender</p>
      </div>
      <div class="player-card">
        <img src="player4.jpg" alt="Maria Garcia">
        <h2>Maria Garcia</h2>
        <p>Goalkeeper</p>
      </div>
      <div class="player-card">
        <img src="player5.jpg" alt="Liam Chen">
        <h2>Liam Chen</h2>
        <p>Forward</p>
      </div>
      <div class="player-card">
        <img src="player6.jpg" alt="Sophia Patel">
        <h2>Sophia Patel</h2>
        <p>Midfielder</p>
      </div>
      <div class="player-card">
        <img src="player7.jpg" alt="Oliver Martinez">
        <h2>Oliver Martinez</h2>
        <p>Defender</p>
      </div>
      <div class="player-card">
        <img src="player8.jpg" alt="Emma Lee">
        <h2>Emma Lee</h2>
        <p>Forward</p>
      </div>
      <!-- Continue adding player cards as needed -->
    </div>
  </main>
</body>
</html>
